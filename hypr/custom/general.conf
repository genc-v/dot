# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/



decoration {
    # rounding = 0

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 2
        passes = 5
        brightness = 1
        noise = 0.04
        contrast = 1
        popups = true
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 30
        offset = 0 2
        render_power = 4
        color = rgba(00000010)
    }

    # Dim
    dim_inactive = true
    dim_strength = 0.025
    dim_special = 0.07
}



# --- LAPTOP SCREEN (eDP-1) ---
workspace = 1, monitor:HDMI-A-1, default:true, persistent:true
workspace = 2, monitor:HDMI-A-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true

workspace = 4, monitor:eDP-1, default:true, persistent:true

workspace = 5, monitor:DP-2, persistent:true
# --- EXTERNAL MONITOR 1 (HDMI-A-1) ---


workspace = 6, monitor:DP-2, persistent:true

# --- EXTERNAL MONITOR 2 (DP-2) ---
workspace = 7, monitor:DP-2, default:true, persistent:true
workspace = 8, monitor:DP-2, persistent:true
workspace = 9, monitor:DP-2, persistent:true
workspace = 10, monitor:DP-2, persistent:true

