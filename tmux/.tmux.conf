# ==========================
# ===  Clipboard & Fixes ===
# ==========================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Ms=\E]52;c;%p2%s\7'
set -s set-clipboard on
set -s escape-time 10
set -g focus-events on

# ==========================
# ===   General Settings ===
# ==========================
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ==========================
# ===   Key Bindings     ===
# ==========================
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize (hold shift)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Switch windows (Alt + Number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2 
bind -n M-3 select-window -t 3 
bind -n M-4 select-window -t 4 
bind -n M-5 select-window -t 5 
bind -n M-6 select-window -t 6 
bind -n M-7 select-window -t 7 
bind -n M-8 select-window -t 8 
bind -n M-9 select-window -t 9 

# Copy Mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================
# ===   Minimal UI       ===
# ==========================
set -g status-style bg=default,fg=white          # Transparent background
set -g status-left "#[fg=blue,bold]#S "          # Clean session name
set -g status-right "#[fg=white,dim]%H:%M "      # Just the time
set -g window-status-current-style fg=magenta,bold # Highlight active window
set -g pane-border-style fg=brightblack          # Subtle borders
set -g pane-active-border-style fg=blue          # Blue active border

bind t choose-tree -s
# Allow programs inside tmux to talk to terminal directly
set -g allow-passthrough on

# Advertise correct terminal features
set -g default-terminal "tmux-256color"

# VERY IMPORTANT: enable modern escape sequences
set -as terminal-features ',*:notify'
